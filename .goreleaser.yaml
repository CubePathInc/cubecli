version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: cubecli
    main: .
    binary: cubecli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/CubePathInc/cubecli/internal/version.Version={{.Version}}
      - -X github.com/CubePathInc/cubecli/internal/version.Commit={{.Commit}}
      - -X github.com/CubePathInc/cubecli/internal/version.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "cubecli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: CubePathInc
    name: cubecli
  draft: false
  prerelease: auto
